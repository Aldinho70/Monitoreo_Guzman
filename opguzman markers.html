        <script>
        // Variables globales para los marcadores y mapa de Google
        var map;
        var markers = [];
        var infoWindow;
        

        // Función para inicializar el mapa de Google
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 20.6784, lng: -101.3547 },
                zoom: 5
            });
            infoWindow = new google.maps.InfoWindow();
        }

        // Función para agregar un marcador en el mapa
        function addMarker(lat, lng, unidad) {
            var marker = new google.maps.Marker({
                position: { lat: lat, lng: lng },
                map: map,
                label:unidad
            });
            markers.push(marker);

            // Mostrar la ventana de información y hacer zoom al hacer clic en el marcador
            marker.addListener('click', function() {
                infoWindow.setContent(unidad); // Establecer el contenido de la ventana de información como el nombre de la unidad
                infoWindow.open(map, marker);
                map.setZoom(12); // Establecer el nivel de zoom deseado
                map.setCenter(marker.getPosition()); // Centrar el mapa en el marcador
            });

            return marker;
        }

        // Función para manejar el cambio de la alternancia del botón
        function createToggleButtonHandler(lat, lng, unidad) {
            return function() {
                var index = parseInt($(this).attr("id").substr(6));

                if ($(this).is(":checked")) {
                    markers[index] = addMarker(lat, lng, unidad);
                } else {
                    markers[index].setMap(null);
                }
            };
        }
        // Ejecutar la función al cargar la página
        $(document).ready(function () {

            initMap();
            
        });
        </script>
